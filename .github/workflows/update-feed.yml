name: Update zf.xml and hf.xml from GDrive

on:
  schedule:
    - cron: "0 * * * *"   # runs day at 1AM
  workflow_dispatch:       # allows manual run from GitHub UI

jobs:
  update-zf-hf-xmls:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install gdown
        run: pip install gdown

      - name: Download the XMLs from Google Drive
        run: |
          ZF_ID="1tzhoccNFnN10ZJUANbVTwv6WnpoJ0ZOe"
          HF_ID="17dejy2sqx-yf8NSDiDfL_NhZWO7iRI8U"
      
          # Download with confirmation token handling
          curl -L -c /tmp/cookies.txt "https://drive.google.com/uc?export=download&id=${ZF_ID}" -o /tmp/zf_check.html
          CONFIRM=$(grep -o 'confirm=[^&"]*' /tmp/zf_check.html | head -1 | cut -d= -f2)
          if [ -n "$CONFIRM" ]; then
            curl -L -b /tmp/cookies.txt "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${ZF_ID}" -o zf.xml
          else
            mv /tmp/zf_check.html zf.xml
          fi
      
          curl -L -c /tmp/cookies.txt "https://drive.google.com/uc?export=download&id=${HF_ID}" -o /tmp/hf_check.html
          CONFIRM=$(grep -o 'confirm=[^&"]*' /tmp/hf_check.html | head -1 | cut -d= -f2)
          if [ -n "$CONFIRM" ]; then
            curl -L -b /tmp/cookies.txt "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${HF_ID}" -o hf.xml
          else
            mv /tmp/hf_check.html hf.xml
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git add zf.xml hf.xml
          git commit -m "Update zf.xml and hf.xml from Google Drive at $TIMESTAMP" || echo "No changes to commit"
          git push
