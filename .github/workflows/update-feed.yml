name: Update zf.xml and hf.xml from GDrive

on:
  schedule:
    - cron: "0 * * * *"   # runs day at 1AM
  workflow_dispatch:       # allows manual run from GitHub UI

jobs:
  update-zf-hf-xmls:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install gdown
        run: pip install gdown

      - name: Download the XMLs from Google Drive
        run: |
          ZF_ID="1tzhoccNFnN10ZJUANbVTwv6WnpoJ0ZOe"
          HF_ID="17dejy2sqx-yf8NSDiDfL_NhZWO7iRI8U"
          
          curl -L "https://drive.usercontent.google.com/download?id=${ZF_ID}&export=download&authuser=0&confirm=t" -o zf.xml
          curl -L "https://drive.usercontent.google.com/download?id=${HF_ID}&export=download&authuser=0&confirm=t" -o hf.xml

      - name: Validate downloaded files are XML
        run: |
          head -c 5 zf.xml | grep -q '<?xml' || (echo "zf.xml is not valid XML!" && cat zf.xml && exit 1)
          head -c 5 hf.xml | grep -q '<?xml' || (echo "hf.xml is not valid XML!" && cat hf.xml && exit 1)

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git add zf.xml hf.xml
          git commit -m "Update zf.xml and hf.xml from Google Drive at $TIMESTAMP" || echo "No changes to commit"
          git push
